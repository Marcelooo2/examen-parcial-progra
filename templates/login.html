<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema Web</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .error { color: red; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Iniciar Sesión</h2>
        <input type="text" id="username" placeholder="Usuario" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <p class="error" id="error-msg">Credenciales incorrectas</p>
        <button onclick="hacerLogin()">Ingresar</button>
    </div>

    <script>
        const BACKEND_URL = "https://api-examen-backend.onrender.com";

        async function hacerLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            try {
                const response = await fetch(`${BACKEND_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    localStorage.setItem('usuarioNombre', data.nombre);
                    window.location.href = 'principal.html'; // Redirige a /principal si OK 
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                }
            } catch (error) {
                alert("Error conectando con el servidor");
            }
        }
    </script>
</body>
</html>
